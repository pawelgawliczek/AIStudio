version: '3.8'

services:
  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg15
    container_name: vibe-studio-postgres
    environment:
      POSTGRES_DB: vibestudio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-361a30c6d68396be29c7eddc3f9ff1b1cfe07675c707232a370bda33f7c8b518}
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backups:/backups  # Mount for database backups (ST-70)
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aistudio-network

  # Redis for caching and Bull queue
  redis:
    image: redis:7-alpine
    container_name: vibe-studio-redis
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aistudio-network

  # Backend API (NestJS)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vibe-studio-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-361a30c6d68396be29c7eddc3f9ff1b1cfe07675c707232a370bda33f7c8b518}@postgres:5432/vibestudio
      REDIS_URL: redis://redis:6379
      JWT_SECRET: development-secret-change-in-production
      PORT: 3000
    ports:
      - '127.0.0.1:3001:3000'
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - /app/backend/node_modules
      - /app/shared/node_modules
      - .:/opt/stack/AIStudio  # Mount full repository for code analysis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aistudio-network
      - stack_appnet
    command: sh -c "cd backend && npx nest build && node dist/main.js"

  # Frontend (React + Vite)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: vibe-studio-frontend
    environment:
      VITE_API_URL: /api
      VITE_WS_URL: /socket.io
    ports:
      - '127.0.0.1:5174:5173'
    volumes:
      - ./frontend:/app/frontend
      - ./shared:/app/shared
      - /app/frontend/node_modules
      - /app/shared/node_modules
    depends_on:
      - backend
    networks:
      - aistudio-network
      - stack_appnet
    command: npm run dev --workspace=frontend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  aistudio-network:
    driver: bridge
  stack_appnet:
    external: true
