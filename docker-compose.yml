version: '3.8'

# Vibe Studio Docker Compose Configuration
# Production-ready setup with development capabilities
# Usage: docker compose up -d --build

services:
  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg15
    container_name: vibe-studio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibestudio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_POSTGRES_PASSWORD}
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backups:/backups  # Mount for database backups (ST-70)
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aistudio-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis for caching and Bull queue
  redis:
    image: redis:7-alpine
    container_name: vibe-studio-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aistudio-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API (NestJS)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vibe-studio-backend
    restart: unless-stopped
    command: ["node", "backend/dist/main.js"]  # Skip migrations for DEV
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-CHANGE_ME_POSTGRES_PASSWORD}@postgres:5432/vibestudio?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3000
      # HOST path for transcript tracking (where Claude Code runs, not Docker path)
      PROJECT_HOST_PATH: /Users/pawelgawliczek/projects/AIStudio
      # Container path for Docker Runner spawning (ST-195)
      PROJECT_PATH: /opt/stack/AIStudio
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      # ST-236: Mount full project for git/docker deployment operations
      - .:/opt/stack/AIStudio
      # ST-236: Mount SSH keys for git pull (deploy_to_production)
      - ~/.ssh:/home/nodejs/.ssh:ro
      # For hot-reload during development
      - ./backend/src:/app/backend/src
      - ./backend/prisma:/app/backend/prisma
      - ./shared/src:/app/shared/src
      - ./frontend/src:/app/frontend/src:ro
      # Mount .git for code analysis
      - ./.git:/app/.git:ro
      # Mount worktrees for deployment tool (dynamic - subdirs auto-appear)
      - ./worktrees:/Users/pawelgawliczek/projects/AIStudio/worktrees
      # Mount coverage data for test coverage analysis
      - ./backend/coverage:/app/backend/coverage:ro
      - ./frontend/coverage:/app/frontend/coverage:ro
      # Mount Docker socket for spawning Docker Runner (ST-195)
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aistudio-network
      - stack_appnet
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (React + Vite)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ""
    container_name: vibe-studio-frontend
    restart: unless-stopped
    ports:
      - '127.0.0.1:5173:80'
    depends_on:
      - backend
    networks:
      - aistudio-network
      - stack_appnet
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  aistudio-network:
    driver: bridge
  stack_appnet:
    external: true
