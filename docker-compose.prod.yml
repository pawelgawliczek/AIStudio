version: '3.8'

# Vibe Studio Production Docker Compose Configuration
# Version: 1.0
# Last Updated: 2025-11-10
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d --build
#
# IMPORTANT: Change passwords and secrets before deploying!

services:
  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg15
    container_name: vibe-studio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibestudio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Only expose to localhost for MCP server access from host
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aistudio-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis for caching and Bull queue
  redis:
    image: redis:7-alpine
    container_name: vibe-studio-redis
    restart: unless-stopped
    ports:
      # Only expose to localhost
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aistudio-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API (NestJS)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: vibe-studio-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-CHANGE_THIS_PASSWORD}@postgres:5432/vibestudio?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      PORT: 3000
      # HOST path for transcript tracking (where Claude Code runs, not Docker path)
      PROJECT_HOST_PATH: /opt/stack/AIStudio
    ports:
      # Only expose to localhost (Caddy will reverse proxy)
      - '127.0.0.1:3000:3000'
    volumes:
      # For hot-reload during development (remove in pure production)
      - ./backend/src:/app/backend/src
      - ./backend/prisma:/app/backend/prisma
      - ./shared/src:/app/shared/src
      - ./frontend/src:/app/frontend/src:ro
      # Mount .git for code analysis
      - ./.git:/app/.git:ro
      # Mount coverage data for test coverage analysis
      - ./backend/coverage:/app/backend/coverage:ro
      - ./frontend/coverage:/app/frontend/coverage:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aistudio-network
      - stack_appnet
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (React + Vite)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost/api}
    container_name: vibe-studio-frontend
    restart: unless-stopped
    ports:
      # Only expose to localhost (Caddy will reverse proxy)
      - '127.0.0.1:5173:80'
    depends_on:
      - backend
    networks:
      - aistudio-network
      - stack_appnet
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3


volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  aistudio-network:
    driver: bridge
  stack_appnet:
    external: true
