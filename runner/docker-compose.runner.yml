# Docker Compose for Story Runner
# Use: docker compose -f docker-compose.runner.yml up
# ST-195: This file is DEPRECATED - workflow execution now uses laptop orchestrator
# The backend delegates to the laptop agent via RemoteExecutionService instead of spawning Docker.
# This file is kept for reference but should not be used in production.

version: '3.8'

services:
  runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: story-runner
    environment:
      - NODE_ENV=production
      # Use backend service name within Docker network (vibe-studio-backend:3000)
      # For production KVM: backend is accessible at vibe-studio-backend:3000 via aistudio-network
      # For local dev: use host.docker.internal:3001 (override via env var)
      - RUNNER_BACKEND_URL=${RUNNER_BACKEND_URL:-http://vibe-studio-backend:3000}
      - RUNNER_WORKING_DIRECTORY=/workspace
      - RUNNER_MAX_TOKEN_BUDGET=${RUNNER_MAX_TOKEN_BUDGET:-500000}
      - RUNNER_MAX_AGENT_SPAWNS=${RUNNER_MAX_AGENT_SPAWNS:-20}
      - RUNNER_MAX_RUN_DURATION=${RUNNER_MAX_RUN_DURATION:-7200000}
      # NOTE: ANTHROPIC_API_KEY removed - laptop orchestrator has Claude Code configured
    volumes:
      # Mount workspace for Claude Code access
      - ${WORKSPACE_PATH:-./workspace}:/workspace:rw
      # Mount checkpoints for persistence
      - runner-checkpoints:/app/.runner/checkpoints
      # Mount Claude Code config if needed
      - ~/.claude:/home/runner/.claude:ro
    networks:
      - aistudio-network
    restart: unless-stopped
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

volumes:
  runner-checkpoints:

networks:
  # Use the same network as the main application (ST-195)
  aistudio-network:
    external: true
    name: aistudio_aistudio-network
